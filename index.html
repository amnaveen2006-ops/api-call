<!DOCTYPE html>
<html>
<head>
  <title>Product Management App</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
    }

    .card img {
      height: 180px;
      object-fit: cover;
    }

    #loader {
      display: none;
      text-align: center;
      font-weight: bold;
      margin: 15px;
    }
  </style>
</head>

<body>

<div class="container py-4">

  <h2 class="text-center mb-3">Product Management App</h2>

  <!-- Intro -->
  <p class="text-center text-muted">
    You can easily add, update, delete and search products. This app demonstrates simple product management using API and JavaScript.
  </p>

  <!-- Search -->
  <input type="text" id="searchInput" class="form-control mb-4" placeholder="Search product...">

  <!-- Form -->
  <form id="productForm" class="card p-3 mb-4 shadow-sm">
    <div class="row g-2">

      <div class="col-12 col-md-4">
        <input type="text" id="title" class="form-control" placeholder="Title">
      </div>

      <div class="col-12 col-md-3">
        <input type="number" id="price" class="form-control" placeholder="Price">
      </div>

      <div class="col-12 col-md-5">
        <input type="text" id="image" class="form-control" placeholder="Image URL">
      </div>

    </div>

    <button type="submit" id="submitBtn" class="btn btn-primary mt-3 w-100">Add Product</button>
  </form>

  <!-- Loader -->
  <div id="loader">Loading...</div>

  <!-- Product List -->
  <div id="productList" class="row g-3"></div>

</div>

<script src="script.js"></script>

</body>
</html>
